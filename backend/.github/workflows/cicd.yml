name: Deploy Node Application

on:
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
    - name: Login to docker hub
      run: docker login -u ${{ secrets.DOCKER_USERNAME}} -p ${{ secrets.DOCKER_PASSWORD}}
    - name: Build docker image
      run: docker build -t safakedidi/smart-book-creator-node .
    - name: Push image to dockerhub
      run: docker push safakedidi/smart-book-creator-node:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
    - name: Pull image from dockerhub
      run: docker pull safakedidi/smart-book-creator-node:latest
    - name: Create .env file
      run: |
        echo "MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}" > .env
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
        echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
        echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
        echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> .env
        echo "S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}" >> .env
        echo "PORT=8000" >> .env
    - name: Stop and remove old container
      run: |
        docker stop smart-book-creator-api-container || true
        docker rm smart-book-creator-api-container || true
    - name: Run docker container
      run: docker run -d -p 8000:8000 --name smart-book-creator-api-container --env-file .env safakedidi/smart-book-creator-node
